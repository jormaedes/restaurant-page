<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 280" width="320" height="280">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&amp;family=Jost:wght@300;400&amp;display=swap');
    </style>
  </defs>



  <!-- Outer decorative circle -->
  <circle cx="160" cy="100" r="68" fill="none" stroke="#C9A84C" stroke-width="0.6" opacity="0.5"/>

  <!-- Inner thin circle -->
  <circle cx="160" cy="100" r="60" fill="none" stroke="#C9A84C" stroke-width="0.3" opacity="0.3"/>

  <!-- Cloche dome (main icon) -->
  <!-- Dome arc -->
  <path d="M114 108 Q114 68 160 68 Q206 68 206 108" fill="none" stroke="#C9A84C" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Dome base line -->
  <line x1="108" y1="108" x2="212" y2="108" stroke="#C9A84C" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Plate base -->
  <path d="M100 116 Q160 122 220 116" fill="none" stroke="#C9A84C" stroke-width="1.0" stroke-linecap="round"/>

  <!-- Cloche handle (top knob) -->
  <circle cx="160" cy="72" r="5" fill="none" stroke="#C9A84C" stroke-width="1.2"/>
  <circle cx="160" cy="72" r="2" fill="#C9A84C"/>

  <!-- Small steam lines above dome -->
  <path d="M148 62 Q146 56 148 50 Q150 44 148 38" fill="none" stroke="#C9A84C" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <path d="M160 60 Q158 54 160 48 Q162 42 160 36" fill="none" stroke="#C9A84C" stroke-width="0.8" stroke-linecap="round" opacity="0.7"/>
  <path d="M172 62 Q174 56 172 50 Q170 44 172 38" fill="none" stroke="#C9A84C" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>

  <!-- Decorative dots on circle -->
  <circle cx="160" cy="32" r="1.5" fill="#C9A84C" opacity="0.6"/>
  <circle cx="228" cy="100" r="1.5" fill="#C9A84C" opacity="0.6"/>
  <circle cx="92" cy="100" r="1.5" fill="#C9A84C" opacity="0.6"/>

  <!-- Horizontal rule -->
  <line x1="80" y1="148" x2="240" y2="148" stroke="#C9A84C" stroke-width="0.4" opacity="0.5"/>

  <!-- Diamond centre on rule -->
  <polygon points="160,144 163,148 160,152 157,148" fill="#C9A84C" opacity="0.7"/>

  <!-- Restaurant name -->
  <text x="160" y="178" font-family="'Cormorant Garamond', Georgia, serif" font-size="34" font-weight="300" fill="#F2EBD9" text-anchor="middle" letter-spacing="10">MAISON</text>

  <!-- Thin divider -->
  <line x1="128" y1="192" x2="192" y2="192" stroke="#C9A84C" stroke-width="0.5" opacity="0.6"/>

  <!-- Tagline -->
  <text x="160" y="212" font-family="'Jost', Arial, sans-serif" font-size="8.5" font-weight="300" fill="#9A8E7A" text-anchor="middle" letter-spacing="4">FINE DINING</text>
</svg>
